@switch(state){

	@case('loading'){
		<app-alert alertState="loading" text="Cargando Ordenes..." ></app-alert>
	}

	@case('error'){
		<app-alert alertState="error" text="Error al Cargar las Ordenes" ></app-alert>
	}

	@case('success'){
		<app-orders-table [orders]="orders" ></app-orders-table>
	}

}
