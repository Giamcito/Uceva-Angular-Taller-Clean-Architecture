<app-alert [state]="state"></app-alert>

<div *ngIf="state === 'success'" class="container-fluid">
  <app-reviews-table [reviews]="reviews"></app-reviews-table>
</div>

<div *ngIf="state === 'loading'" class="d-flex justify-content-center align-items-center mt-5">
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">Cargando...</span>
  </div>
</div>
